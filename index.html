<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kristodea</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent1:#00f6ff;
  --accent2:#6b00ff;
  --accent3:#ff3ec5;
  --accent4:#ffd300;
  --bg-speed:20s;
  --max-width:980px;
}

/* Body & background */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;
  color:#fff;
  background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3),var(--accent4));
  background-size:400% 400%;
  animation:neonBG var(--bg-speed) linear infinite;
  position:relative;
}

@keyframes neonBG{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.overlay{
  position:fixed;
  inset:0;
  pointer-events:none;
  mix-blend-mode:overlay;
  background:linear-gradient(180deg, rgba(0,0,0,0.03), rgba(0,0,0,0.12));
  z-index:1;
}

.wrap{
  max-width:var(--max-width);
  width:94%;
  margin:28px auto;
  text-align:center;
  position:relative;
  z-index:3;
}

/* Landing / Intro Modal */
#introModal {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  z-index:9999;
}

#introContent {
  text-align: center;
  padding: 32px 28px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  box-shadow: 0 12px 36px rgba(0,0,0,0.5);
  animation: bounceIn 0.6s ease-out;
}

#introContent h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.8rem;
  font-weight: 900;
  color: #fff;
  margin-bottom: 24px;
}

#introContent .btn-row{
  display: flex;
  justify-content: center;
  gap: 16px;
}

#introContent .btn{
  padding: 12px 20px;
  font-size: 1rem;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

#introContent .btn.ok{
  background: linear-gradient(90deg,#00f6ff,#6b00ff);
  color: #fff;
}

#introContent .btn.later{
  background: rgba(255,255,255,0.1);
  color: #fff;
}

@keyframes bounceIn {
  0% { transform: scale(0.6); opacity: 0; }
  60% { transform: scale(1.05); opacity: 1; }
  80% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

/* Heading */
.hbb-text h1 {
  font-family:'Playfair Display', serif;
  font-weight:900;
  font-size:3rem;
  color:#fff;
  line-height:1.2;
  text-align:center;
  margin-bottom:8px;
  border:1px solid rgba(255,255,255,0.25);
  padding:6px 12px;
  border-radius:6px;
  box-shadow:0 0 6px rgba(255,255,255,0.08);
  display:inline-block;
}

.hbb-text h1 span{display:block;}

.subline{
  font-family:'Poppins',sans-serif;
  font-size:1.2rem;
  font-weight:600;
  margin-bottom:18px;
  color:#ffe6f0;
}

/* Pictures */
.pictures{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin:16px auto;
  width:100%;
  max-width:360px;
  align-items:center;
  justify-content:center;
}

.pictures img {
    border-radius: 18px;
    width: 96%;
    aspect-ratio: 9/16;
    object-fit: cover;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(8px);
    box-shadow:0 8px 24px rgba(0,0,0,0.25);
    padding: 4px;
    animation: floatPic 8s ease-in-out infinite alternate;
}

@keyframes floatPic{
  0%{transform:translateY(0px)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0px)}
}

/* Video */
.videos{
  display:flex;
  flex-direction:column;
  gap:14px;
  max-width:360px;
  margin:16px auto;
}

.video-card {
  width:100%;
  border-radius:18px;
  overflow:hidden;
  background:rgba(255,255,255,0.04);
  box-shadow:0 12px 40px rgba(0,0,0,0.45);
  padding:4px;
  animation: floatVid 10s ease-in-out infinite alternate;
}

.video-card video{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
  border-radius:12px;
}

@keyframes floatVid{
  0%{transform:translateY(0px)}
  50%{transform:translateY(-5px)}
  100%{transform:translateY(0px)}
}

/* Speech */
.speech{
  font-size:1.1rem;
  max-width:540px;
  margin:12px auto;
  padding:16px 20px;
}

/* Emojis */
.floating-emoji{
  position:fixed;
  font-size:28px;
  animation:floatEmoji 12s linear infinite;
  opacity:0.85;
  pointer-events:none;
  z-index:0;
}

@keyframes floatEmoji{
  0%{transform:translateY(110vh) rotate(0deg);}
  100%{transform:translateY(-10vh) rotate(360deg);}
}

/* Footer */
footer{
  margin-top:16px;
  color:rgba(255,255,255,0.95);
  font-size:13px;
}
</style>
</head>

<body>
<div class="overlay"></div>
<div id="emojiContainer"></div>

<!-- INTRO -->
<div id="introModal">
  <div id="introContent">
    <h1>WELCOME KRISDAN</h1>
    <div class="btn-row">
      <button class="btn ok" id="enterBtn">ENTER 🎉</button>
      <button class="btn later" id="closeIntroBtn">CLOSE</button>
    </div>
  </div>
</div>

<div class="wrap">

  <div class="hbb-text">
    <h1>Happy Birthday<br><span>💙💛 KRISTODEA 💝</span></h1>
  </div>

  <div class="subline">Our Krisdan</div>

  <!-- IMAGES -->
  <section class="pictures">
    <img src="K1.jpg">
    <img src="K2.jpg">
    <img src="K3.jpg">
    <img src="K4.jpg">
    <img src="K5.jpg">
  </section>

  <!-- VIDEO (ONLY ONE) -->
  <section class="videos">
    <div class="video-card">
      <video playsinline muted loop autoplay>
        <source src="kv1.mp4" type="video/mp4">
      </video>
    </div>
  </section>

  <!-- GIFT + MESSAGE SYSTEM -->
<div style="margin-top:40px;">

  <h2 style="margin-bottom:10px;">🎁 Send a Birthday Gift</h2>

  <!-- MESSAGE -->
  <textarea id="userMessage" placeholder="Write a message for Krisdan..."
  style="width:90%;max-width:400px;padding:12px;border-radius:10px;border:none;margin-bottom:10px;"></textarea>

  <!-- WHEEL -->
  <canvas id="wheel" width="250" height="250" style="margin:10px auto;display:block;"></canvas>

  <button id="spinBtn" style="padding:12px 20px;border:none;border-radius:10px;background:#6b00ff;color:white;">
    SPIN 🎡
  </button>

  <p id="result" style="margin-top:10px;font-weight:600;"></p>

  <button id="sendGift" style="margin-top:10px;padding:12px 20px;border:none;border-radius:10px;background:#00f6ff;color:black;">
    Send via WhatsApp 💬
  </button>

</div>

  <div class="speech">
Happy Birthday Krisdan 🎉🎂<br><br>
Wishing you blessings, growth and joy ✨
  </div> 

  <footer>Made with 💙
  <p>@NanaB</p> </footer>

</div>

<audio id="bgAudio" src="song3.mp3" loop></audio>

<script>
// ================= EMOJIS =================
const emojis=['❤️','💛','💙','🎉','🎈','✨','😂','💫'];
const container=document.getElementById('emojiContainer');

for(let i=0;i<10;i++){
  const e=document.createElement('div');
  e.className='floating-emoji';
  e.textContent=emojis[i%emojis.length];
  e.style.left=Math.random()*90+'%';
  e.style.animationDuration=(10+Math.random()*8)+'s';
  container.appendChild(e);
}

// ================= INTRO =================
document.getElementById('enterBtn').onclick=()=>{
  document.getElementById('introModal').style.display='none';
  document.getElementById('bgAudio').play();
};

document.getElementById('closeIntroBtn').onclick=()=>{
  document.getElementById('introModal').style.display='none';
};


// ================= SPIN WHEEL =================
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const gifts = [5,10,15,20,50];
const colors = ["#ff3ec5","#6b00ff","#00f6ff","#ffd300","#00ff88"];
const total = gifts.length;
const arc = (2*Math.PI)/total;

let angle = 0;
let spinning = false;
let selected = null;

function drawWheel(){
  for(let i=0;i<total;i++){
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(125,125);
    ctx.arc(125,125,100,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(125,125);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle="#000";
    ctx.font="bold 14px Poppins";
    ctx.fillText(gifts[i]+" GHC",60,5);
    ctx.restore();
  }
}

drawWheel();

document.getElementById("spinBtn").onclick=()=>{
  if(spinning) return;
  spinning = true;

  let spinAngle = Math.random()*3000 + 2000;

  let start = null;

  function animate(t){
    if(!start) start = t;
    let progress = t - start;

    angle = spinAngle * (1 - Math.pow(progress/2000,3));
    canvas.style.transform = `rotate(${angle}deg)`;

    if(progress < 2000){
      requestAnimationFrame(animate);
    } else {
      spinning = false;

      let final = (angle % 360);
      let index = Math.floor((360 - final) / (360/total)) % total;
      selected = gifts[index];

      document.getElementById("result").innerText =
        "You got " + selected + " GHC 🎉";
    }
  }

  requestAnimationFrame(animate);
};


// ================= WHATSAPP SEND =================
document.getElementById("sendGift").onclick=()=>{
  const msg = document.getElementById("userMessage").value || "Happy Birthday 🎉";

  if(!selected){
    alert("Spin first!");
    return;
  }

  const finalMessage =
`🎉 Birthday Gift 🎁

Amount: ${selected} GHC
Message: ${msg}`;

  const phone = "233504620130";

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(finalMessage)}`, "_blank");
};
</script>

</body>
</html>
